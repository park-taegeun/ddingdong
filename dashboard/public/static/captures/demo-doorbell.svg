  <text x="200" y="196" font-size="30" font-family="'Apple SD Gothic Neo','Malgun Gothic',sans-serif" font-weight="700" fill="#2B4C82" text-anchor="middle">택배 방문자</text>
  <text x="200" y="234" font-size="16" font-family="'Apple SD Gothic Neo','Malgun Gothic',sans-serif" fill="#6B7C99" text-anchor="middle">시연용 예시 이미지</text>
