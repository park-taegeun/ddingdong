; ddingdong firmware - PlatformIO Project Configuration
;
; 사전 검증 ①② 결과 반영:
; - 구체 내용: docs/decisions.md 카테고리 1~3, 9 참조
; - context7 공식 PlatformIO 도쯌서 검증된 board ID 및 PSRAM 빌드 플래그 사용
; - 참고 platformio.ini: https://github.com/susesKaninchen/OnlyFeet/blob/main/platformio.ini
;   (그대로 차용하지 않음 — OnlyFeet은 pioarduino fork 사용, 본 프로젝트는 공식 platform=espressif32 적용)

[platformio]
default_envs = poc

[env:poc]
platform = espressif32
board = seeed_xiao_esp32s3
framework = arduino
monitor_speed = 115200
upload_speed = 921600

; PSRAM enable + cache issue fix + 카메라 모델 define (XIAO Sense Pre-Soldered = OV3660 자동 매칭)
build_flags =
  -DCAMERA_MODEL_XIAO_ESP32S3
  -DBOARD_HAS_PSRAM
  -mfix-esp32-psram-cache-issue

; 라이브러리 종속성 (사전 검증 ① 권장 조건부 GO + 폴백)
; - SparkFun_VL53L5CX_Arduino_Library: 메인 (PoC 시 우선 적용)
; - Adafruit_VL53L5: 폴백 (PoC 시 fail 대비용, 5/16~5/17 결제 단계에서 전환 가능)
; - I2C 1MHz 권장값 적용은 5/11 ToF 코드 작성 시 채팅방 2에 위임
lib_deps =
  sparkfun/SparkFun VL53L5CX Arduino Library
  adafruit/Adafruit VL53L5

; Arduino-ESP32 core 버전은 platform=espressif32 latest에 따름.
; SparkFun_VL53L5CX_Arduino_Library 1.0.3 (2022) 호환성 확인은
; PoC 1주차 빌드 시 재검증.

; env:prod 환경은 8주차 진입 시 추가 예정 (docs/decisions.md 카테고리 5 참조)
