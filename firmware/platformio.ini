; ddingdong firmware - PlatformIO Project Configuration
;
; 사전 검증 ①② 결과 반영:
; - context7 공식 PlatformIO 도큐서 검증된 board ID 및 PSRAM 빌드 플래그 사용
; - 참고 platformio.ini: https://github.com/susesKaninchen/OnlyFeet/blob/main/platformio.ini
;
; 5/9 카메라 더미 테스트 추가 (PoC-(6) Day 3):
; - env:camera_v1 (Version A: cameraTask 단독)
; - env:camera_v2 (Version B: writerTask 분리)
; - env:poc는 5/8 WiFi 더미 테스트 그대로 보존 (default_envs 유지)
;
; esp32-camera 라이브러리: 옵션 A 채택 — Arduino-ESP32 core 3.x (framework-arduinoespressif32@3.20017)는
; esp32-camera를 bundled library로 포함하므로 #include "esp_camera.h"만으로 사용 가능.
; (별도 lib_deps 추가 시 duplicate symbol 우려 → 옵션 B 회피.
;  출처: context7 /espressif/arduino-esp32 — core 3.x bundled libraries 확인)

[platformio]
default_envs = poc

[env:poc]
platform = espressif32
board = seeed_xiao_esp32s3
framework = arduino
monitor_speed = 115200
upload_speed = 921600

; PSRAM enable + cache issue fix + 카메라 모델 define (XIAO Sense Pre-Soldered = OV3660 자동 매칭)
build_flags =
  -DCAMERA_MODEL_XIAO_ESP32S3
  -DBOARD_HAS_PSRAM
  -mfix-esp32-psram-cache-issue

; env:poc는 WiFi 본 작업 (main.cpp)만 컴파일. 카메라 코드 제외.
build_src_filter =
  +<*>
  -<camera_common.cpp>
  -<camera_test_v1.cpp>
  -<camera_test_v2.cpp>

; 사전 검증 ① 권장 (조건부 GO + 폴백)
; - SparkFun_VL53L5CX_Arduino_Library: 메인 (PoC 시 우선 적용, I2C 1MHz 권장값은 5/11 ToF 코드 작성 시 적용)
; - Adafruit_VL53L5: 폴백 (PoC fail 대비)
;   PlatformIO Registry 미등록으로 GitHub URL 직접 명시 (pio pkg search VL53L5 결과 0건 확인)
lib_deps =
  sparkfun/SparkFun VL53L5CX Arduino Library
  https://github.com/adafruit/Adafruit_VL53L5.git
  bblanchon/ArduinoJson@^7.0.0

; Arduino-ESP32 core 버전은 platform=espressif32 latest에 따름 (설치 상: framework-arduinoespressif32@3.20017.241212).
; SparkFun_VL53L5CX_Arduino_Library 1.0.3 (2022) 호환성 확인 완료 (컴파일 SUCCESS).

; env:prod 환경은 8주차 진입 시 추가 예정 (docs/decisions.md 카테고리 5 참조)

; ============================================================
; 카메라 더미 테스트 환경 (5/9, PoC-(6) Day 3)
; ============================================================

[env:camera_v1]
platform = espressif32
board = seeed_xiao_esp32s3
framework = arduino
monitor_speed = 115200
upload_speed = 921600

build_flags =
  -DCAMERA_MODEL_XIAO_ESP32S3
  -DBOARD_HAS_PSRAM
  -mfix-esp32-psram-cache-issue

; Version A: cameraTask 단독. main.cpp / Version B 제외.
build_src_filter =
  -<*>
  +<camera_common.cpp>
  +<camera_test_v1.cpp>

; 카메라 더미 테스트는 WiFi/HTTPS/ToF/JSON 의존성 없음 → lib_deps 비움.

[env:camera_v2]
platform = espressif32
board = seeed_xiao_esp32s3
framework = arduino
monitor_speed = 115200
upload_speed = 921600

build_flags =
  -DCAMERA_MODEL_XIAO_ESP32S3
  -DBOARD_HAS_PSRAM
  -mfix-esp32-psram-cache-issue

; Version B: writerTask 분리 (queue 통신). main.cpp / Version A 제외.
build_src_filter =
  -<*>
  +<camera_common.cpp>
  +<camera_test_v2.cpp>

; ============================================================
; 마이크 더미 테스트 환경 (5/10, PoC Day 4)
; ============================================================
;
; INMP441 + ESP32-S3 I2S1 (카메라 I2S0과 분리, decisions.md 카테고리 1·2).
; ESP-IDF 5.x 새 I2S API (driver/i2s_std.h) 채택 — legacy driver/i2s.h는 deprecated.
; arduino-esp32 core 3.x (framework-arduinoespressif32@3.20017) ESP-IDF 5.x 기반이므로
; 새 API 별도 lib_deps 불필요 (ESP-IDF 내장).

[env:mic_dummy]
platform = espressif32
board = seeed_xiao_esp32s3
framework = arduino
monitor_speed = 115200
upload_speed = 921600

build_flags =
  -DBOARD_HAS_PSRAM
  -mfix-esp32-psram-cache-issue

; mic 더미 테스트만 컴파일. main.cpp / camera 코드 제외.
build_src_filter =
  -<*>
  +<mic_common.cpp>
  +<mic_test.cpp>

; ============================================================
; ToF 더미 테스트 환경 (5/11, PoC Day 5)
; ============================================================
;
; VL53L5CX-SATEL + ESP32-S3 I2C (카테고리 2 핀 표 인용: SDA=GPIO5/D4, SCL=GPIO6/D5).
; 사전 검증 ① 워크어라운드: I2C 1MHz / SATEL 모듈 / 단일 센서 / SparkFun 1차 + Adafruit 폴백.
; 8x8 그리드 × 15Hz (datasheet limit @ 8x8: max 15Hz, SparkFun Example3 검증).
; 부품 부재 상태 (자성리얼 5/15~5/28 도착) → 컴파일 + 메모리 측정까지만.
;
; lib_deps:
;   - SparkFun_VL53L5CX_Arduino_Library v1.0.3 (default_envs=poc에서 이미 검증, 컴파일 SUCCESS)
;   - Adafruit_VL53L5 master 폴백 (depends Adafruit BusIO)
;   ※ 학부생 alert: master 추적은 최신 패치 받지만 깨질 위험. commit pin은 안정/패치 누락.
;     현 단계 master 채택 (PoC 기간 짧음 + Adafruit 안정적). 향후 prod 진입 시 commit pin 재검토.

[env:tof_dummy]
platform = espressif32
board = seeed_xiao_esp32s3
framework = arduino
monitor_speed = 115200
upload_speed = 921600

build_flags =
  -DBOARD_HAS_PSRAM
  -mfix-esp32-psram-cache-issue

lib_deps =
  sparkfun/SparkFun VL53L5CX Arduino Library
  https://github.com/adafruit/Adafruit_VL53L5.git

; tof 더미 테스트만 컴파일. main.cpp / camera / mic 코드 제외.
build_src_filter =
  -<*>
  +<tof_common.cpp>
  +<tof_test.cpp>
